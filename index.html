<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenIntent | 意图路由中枢</title>
    <script src="[https://cdn.tailwindcss.com](https://cdn.tailwindcss.com)"></script>
    <style>
        @import url('[https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap](https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap)');
        
        :root { --accent: #3b82f6; --accent-glow: rgba(59, 130, 246, 0.5); }
        body { 
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif; 
            background-color: #050810; 
            color: #ffffff;
            -webkit-font-smoothing: antialiased;
        }
        .logo-box {
            position: relative; width: 48px; height: 48px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .reasoning-panel {
            background: rgba(0, 0, 0, 0.2); border-left: 1px solid rgba(59, 130, 246, 0.3);
            font-family: 'JetBrains Mono', monospace;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center py-12">
    <div class="fixed inset-0 overflow-hidden pointer-events-none -z-10 text-white/5 uppercase font-black text-[20vw] select-none flex items-center justify-center opacity-10">Intent</div>

    <div class="w-full max-w-4xl px-6">
        <!-- Header -->
        <nav class="flex flex-col items-center text-center gap-4 mb-12">
            <div class="logo-box"><span class="font-black text-xl text-white">OI</span></div>
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight">OpenIntent</h1>
                <p class="text-slate-500 text-xs font-bold uppercase tracking-[0.2em]">Cross-Agent Router Protocol</p>
            </div>
        </nav>

        <!-- Input Area -->
        <section class="mb-12">
            <div class="glass-card rounded-[2.5rem] p-3 transition-all">
                <textarea id="intentInput" rows="3" 
                    class="w-full bg-transparent text-white text-xl font-medium rounded-[2rem] block p-8 outline-none resize-none placeholder-slate-600" 
                    placeholder="描述您的意图或商业需求..."></textarea>
                <div class="p-4 pt-0 flex flex-col md:flex-row gap-4 items-center">
                    <div class="flex flex-wrap gap-2 flex-1">
                        <button onclick="quickFill('寻找 AIGC 3D 赛道的投资人')" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-full text-[10px] font-bold text-slate-400 border border-white/5"># 资本匹配</button>
                        <button onclick="quickFill('查询澳洲清关最新的合规政策')" class="px-4 py-2 bg-white/5 hover:bg-white/10 rounded-full text-[10px] font-bold text-slate-400 border border-white/5"># 跨境贸易</button>
                    </div>
                    <button onclick="dispatchIntent()" class="w-full md:w-auto bg-white text-black px-10 py-4 rounded-2xl font-extrabold hover:scale-[1.02] active:scale-95 transition-all">
                        并发分发
                    </button>
                </div>
            </div>
        </section>

        <!-- Results Area -->
        <div id="loading" class="hidden flex flex-col items-center py-10">
            <div class="w-10 h-10 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-4 text-slate-500 font-bold text-xs tracking-widest uppercase">Routing through protocol...</p>
        </div>
        <div id="resultsGrid" class="space-y-8"></div>
    </div>

    <script>
        const agentData = {
            invest: [{
                name: "VC Matrix", dev: "QUANTUM DATA", icon: "💎",
                answer: "锁定 3 位近期有实际投资动作的合伙人。当前赛道估值中位数约为 2500 万美金。",
                why: "基于 AIGC 语义特征检索了 Q1 获投记录。匹配度基于合伙人近期活跃权重。"
            }],
            trade: [{
                name: "Logi-Expert", dev: "GLOBAL ROUTE", icon: "🚢",
                answer: "本周清关参考价 12.5 AUD/kg。直飞模式可确保存活率 >95%。",
                why: "系统已连接实时货运 API，识别出当前季节性气候风险，建议采用直达链路。"
            }]
        };

        function quickFill(t) { document.getElementById('intentInput').value = t; }
        
        function dispatchIntent() {
            const input = document.getElementById('intentInput').value;
            if (!input) return;
            const loading = document.getElementById('loading');
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            loading.classList.remove('hidden');

            setTimeout(() => {
                loading.classList.add('hidden');
                let results = (input.includes('投资') || input.includes('BP')) ? agentData.invest : 
                          (input.includes('清关') || input.includes('贸易')) ? agentData.trade : [];
                
                if (results.length === 0) {
                    grid.innerHTML = '<p class="text-center text-slate-500">未发现匹配的垂直 Agent，请尝试其他关键词。</p>';
                    return;
                }

                results.forEach((agent, i) => {
                    const card = document.createElement('div');
                    card.className = "glass-card rounded-[2.5rem] p-10 reveal";
                    card.innerHTML = `
                        <div class="flex items-center justify-between mb-8">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 bg-white/5 rounded-xl flex items-center justify-center text-2xl border border-white/10">${agent.icon}</div>
                                <div class="text-left">
                                    <h3 class="text-xl font-bold">${agent.name}</h3>
                                    <p class="text-blue-500 text-[9px] font-black tracking-widest">${agent.dev}</p>
                                </div>
                            </div>
                            <span class="text-blue-400 font-mono text-xs font-bold bg-blue-500/10 px-3 py-1 rounded-lg">MATCH: 98%</span>
                        </div>
                        <div class="mb-8 text-left">
                            <h4 class="text-slate-500 text-[10px] font-black uppercase mb-3">Direct Insight</h4>
                            <p class="text-white text-lg font-semibold">${agent.answer}</p>
                        </div>
                        <div class="reasoning-panel p-5 rounded-xl text-left">
                            <h4 class="text-slate-500 text-[8px] font-black uppercase mb-2">Routing Logic</h4>
                            <p class="text-slate-400 text-xs">${agent.why}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }, 800);
        }
    </script>
</body>
</html>
